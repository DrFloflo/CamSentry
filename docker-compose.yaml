services:
  worldcam:
    build:
      context: .
      dockerfile: Dockerfile.jetson
    container_name: worldcam
    runtime: nvidia
    network_mode: host
    ipc: host
    restart: unless-stopped
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./models:/app/models
    command:
      - python3
      - -m
      - worldcam.main
      - --headless
      - --stream-host
      - 0.0.0.0
      - --stream-port
      - "8080"
